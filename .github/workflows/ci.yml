on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build_test_job:
    name: 'Build and test job'
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: ${{ github.actor == 'dependabot[bot]' && fromJson('["ubuntu-latest"]') || fromJson('["windows-latest", "ubuntu-latest", "macos-latest"]') }}
    steps:

    - name: 'Checking out repo code'
      uses: actions/checkout@v6

    - name: 'Validate build'
      run: |
        npm install
        npm run build
        
    - name: 'Run L0 tests'
      run: |
        npm run test
